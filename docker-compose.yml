# Quick start (after `docker build -t clarity-inference-pipeline:local .`):
#   mkdir -p data/dicom data/out
#   cp -r /path/to/your/dicom/series/* data/dicom/
#   docker compose run --rm clarity-pipeline predict \
#     --input /data/dicom --work-dir /data/out --weights-dir /models --device cpu
#
# Weights: place or symlink `pnvrn_folds` next to this file, or set WEIGHTS_DIR to an absolute path.
services:
  clarity-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: clarity-inference-pipeline:local
    volumes:
      - ${DICOM_DIR:-./data/dicom}:/data/dicom:ro
      - ${OUT_DIR:-./data/out}:/data/out
      - ${WEIGHTS_DIR:-./pnvrn_folds}:/models:ro

  clarity-pipeline-gpu:
    profiles:
      - gpu
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: clarity-inference-pipeline:gpu
    volumes:
      - ${DICOM_DIR:-./data/dicom}:/data/dicom:ro
      - ${OUT_DIR:-./data/out}:/data/out
      - ${WEIGHTS_DIR:-./pnvrn_folds}:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
